<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="typelessGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24"/>
      <stop offset="100%" style="stop-color:#34D399"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect width="120" height="120" rx="28" fill="url(#typelessGrad)" filter="url(#shadow)"/>

  <!-- 麦克风图标组 -->
  <g transform="translate(26, 18) scale(1.4)">
    <!-- 麦克风主体 -->
    <path d="M22 16 C14 16 8 24 8 34 C8 44 16 52 22 52 C28 52 36 44 36 34 C36 24 28 16 22 16 Z"
          fill="white" opacity="0.95"/>
    <!-- 麦克风支架 -->
    <rect x="32" y="8" width="6" height="16" rx="3" fill="white" opacity="0.95"/>
    <rect x="42" y="4" width="5" height="22" rx="2.5" fill="white" opacity="0.95"/>
    <!-- 声波线条 -->
    <path d="M50 18 Q56 18 56 26 Q56 34 50 34" stroke="white" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.9"/>
    <path d="M54 10 Q62 10 62 26 Q62 42 54 42" stroke="white" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.9"/>
  </g>

  <!-- T字母品牌标识 -->
  <text x="60" y="100" font-family="'Montserrat', Arial, sans-serif" font-size="28" font-weight="800" fill="white" text-anchor="middle" letter-spacing="2">T</text>
</svg>
