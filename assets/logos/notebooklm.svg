<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4285F4"/>
      <stop offset="100%" style="stop-color:#34A853"/>
    </linearGradient>
    <linearGradient id="pageGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F5F5F5"/>
      <stop offset="100%" style="stop-color:#FFFFFF"/>
    </linearGradient>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)"/>

  <!-- 白色笔记本主体 -->
  <g transform="translate(64, 64)">
    <!-- 笔记本封面 -->
    <rect x="0" y="0" width="384" height="384" rx="48" fill="url(#pageGrad)" stroke="#E0E0E0" stroke-width="4"/>

    <!-- 顶部彩色条（代表NotebookLM的品牌色） -->
    <rect x="0" y="0" width="384" height="48" rx="48" fill="#4285F4"/>
    <rect x="0" y="48" width="384" height="16" fill="#34A853"/>
    <rect x="0" y="64" width="384" height="16" fill="#FBBC04"/>
    <rect x="0" y="80" width="384" height="16" fill="#EA4335"/>

    <!-- 横线（代表笔记行） -->
    <rect x="48" y="144" width="288" height="8" rx="4" fill="#D0D0D0"/>
    <rect x="48" y="176" width="240" height="8" rx="4" fill="#D0D0D0"/>
    <rect x="48" y="208" width="264" height="8" rx="4" fill="#D0D0D0"/>
    <rect x="48" y="240" width="192" height="8" rx="4" fill="#D0D0D0"/>

    <!-- LM文字 -->
    <text x="192" y="320" font-family="'Google Sans', Arial, sans-serif" font-size="64" font-weight="bold" fill="#4285F4" text-anchor="middle">LM</text>
  </g>

  <!-- 右上角对话气泡（代表AI对话） -->
  <g transform="translate(320, 80)">
    <ellipse cx="0" cy="0" rx="48" ry="48" fill="#FFFFFF" opacity="0.95"/>
    <circle cx="16" cy="-16" r="12" fill="#4285F4"/>
    <circle cx="16" cy="8" r="12" fill="#34A853"/>
    <circle cx="-8" cy="0" r="12" fill="#FBBC04"/>
  </g>
</svg>
