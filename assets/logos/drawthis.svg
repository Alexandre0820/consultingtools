<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="drawGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#EF4444"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="120" height="120" rx="24" fill="url(#drawGrad)"/>
  <!-- 柱状图图标 -->
  <g transform="translate(20, 30)">
    <rect x="0" y="40" width="16" height="50" rx="2" fill="white" opacity="0.9"/>
    <rect x="24" y="20" width="16" height="70" rx="2" fill="white" opacity="0.9"/>
    <rect x="48" y="0" width="16" height="90" rx="2" fill="white" opacity="0.9"/>
    <rect x="72" y="25" width="16" height="65" rx="2" fill="white" opacity="0.9"/>
  </g>
  <!-- D字母 -->
  <text x="60" y="115" font-family="'Montserrat', Arial, sans-serif" font-size="42" font-weight="800" fill="white" text-anchor="middle">D</text>
</svg>
